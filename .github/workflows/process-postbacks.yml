name: Process Postback Queue

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Process pending postbacks
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Supabase client
        run: npm install @supabase/supabase-js

      - name: Run processor
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          node --input-type=module <<'EOF'
          import { createClient } from "@supabase/supabase-js";

          const supabase = createClient(
            process.env.SUPABASE_URL,
            process.env.SUPABASE_SERVICE_ROLE_KEY
          );

          async function sendTelegramAlert(message) {
            const token = process.env.TELEGRAM_BOT_TOKEN;
            const chatId = process.env.TELEGRAM_CHAT_ID;
            if (!token || !chatId) return;
            try {
              await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  chat_id: chatId,
                  text: message,
                  parse_mode: "Markdown",
                }),
              });
            } catch (e) {
              console.error("Telegram alert failed:", e.message);
            }
          }

          try {
            const { data: rows, error: fetchError } = await supabase
              .from("postback_queue")
              .select("*")
              .eq("status", "pending");

            if (fetchError) throw new Error(`Fetch queue failed: ${fetchError.message}`);

            console.log(`Found ${rows.length} pending postback(s)`);

            let processed = 0;
            let duplicates = 0;

            for (const row of rows) {
              const { player_id, offer_id, payout } = row;

              // Check for existing completion
              const { data: existing, error: checkError } = await supabase
                .from("completions")
                .select("id")
                .eq("player_id", player_id)
                .eq("offer_id", offer_id)
                .limit(1);

              if (checkError) {
                throw new Error(`Duplicate check failed for queue row ${row.id}: ${checkError.message}`);
              }

              if (existing && existing.length > 0) {
                // Duplicate
                await supabase
                  .from("postback_queue")
                  .update({ status: "duplicate" })
                  .eq("id", row.id);
                duplicates++;
                continue;
              }

              // Calculate coins and credit user
              const coins = Math.floor(payout * 80);

              const { error: insertError } = await supabase
                .from("completions")
                .insert({ player_id, offer_id, payout, coins });

              if (insertError) {
                throw new Error(`Insert completion failed for queue row ${row.id}: ${insertError.message}`);
              }

              const { error: rpcError } = await supabase.rpc("increment_coins", {
                p_user_id: player_id,
                p_amount: coins,
              });

              if (rpcError) {
                throw new Error(`increment_coins RPC failed for player ${player_id}: ${rpcError.message}`);
              }

              await supabase
                .from("postback_queue")
                .update({ status: "processed" })
                .eq("id", row.id);

              processed++;
            }

            console.log(`Done — processed: ${processed}, duplicates: ${duplicates}`);
          } catch (err) {
            console.error("Postback processing failed:", err.message);
            await sendTelegramAlert(
              `🚨 *Postback Processor Failed*\n\n\`${err.message}\``
            );
            process.exit(1);
          }
          EOF
